name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, build & audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # Drop the lockfile so npm resolves the runner's own platform-specific
      # Rollup/esbuild optional binaries — definitively avoids npm/cli#4828
      # with a cross-platform-generated lockfile.
      - name: Install
        run: rm -f package-lock.json && npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Reported for visibility but non-blocking: a transient upstream advisory
      # shouldn't break the build. Production deps are audited clean.
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true
