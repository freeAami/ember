name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build only needs to read the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, build & audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm install` (not `npm ci`) so the correct platform-specific Rollup/
      # esbuild optional binaries resolve on the runner — works around
      # npm/cli#4828 when the lockfile is generated on another platform.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
