<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 840" width="1320" height="840" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="au1" cx="12%" cy="0%" r="60%"><stop offset="0" stop-color="#ff8a4c" stop-opacity="0.10"/><stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/></radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb27e"/><stop offset="1" stop-color="#ff8a4c"/></linearGradient>
  </defs>
  <rect width="1320" height="840" fill="#0a0a0c"/>
  <rect width="1320" height="840" fill="url(#au1)"/>

  <!-- rail -->
  <rect x="0" y="0" width="64" height="840" fill="#0e0e11" fill-opacity="0.7"/>
  <line x1="64" y1="0" x2="64" y2="840" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="14" y="20" width="36" height="36" rx="11" fill="#ff8a4c" fill-opacity="0.12"/>
  <path d="M 32 27 C 38 36 40 40 40 46 A 8 8 0 1 1 24 46 C 24 42 26 39 29 37 C 28 42 30 44 32 46 C 30 40 31 33 32 27 Z" fill="url(#flame)"/>
  <rect x="12" y="182" width="40" height="40" rx="11" fill="#ffffff" fill-opacity="0.07"/>
  <g stroke="#ff8a4c" stroke-width="2" fill="none"><rect x="24" y="196" width="16" height="12" rx="2"/><path d="M22 200 h20"/></g>

  <text x="104" y="62" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="-0.5">Archive</text>
  <text x="104" y="88" fill="#ffffff" font-size="14" fill-opacity="0.45">Every day you've lived in Ember, kept for you. The longer you stay, the richer it gets.</text>

  <!-- search bar -->
  <rect x="104" y="112" width="760" height="48" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.07"/>
  <circle cx="132" cy="136" r="7" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/><line x1="137" y1="141" x2="143" y2="147" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
  <text x="156" y="141" fill="#ffffff" font-size="15" fill-opacity="0.3">Search every goal you've ever set…</text>
  <rect x="876" y="112" width="160" height="48" rx="12" fill="#1a1a20" stroke="#ffffff" stroke-opacity="0.1"/><text x="896" y="141" fill="#ffffff" font-size="13" fill-opacity="0.8">All categories ▾</text>
  <rect x="1048" y="112" width="168" height="48" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.1"/>
  <rect x="1054" y="118" width="52" height="36" rx="8" fill="#ff8a4c" fill-opacity="0.9"/><text x="1080" y="141" text-anchor="middle" fill="#0a0a0c" font-size="12">All</text>
  <text x="1126" y="141" fill="#ffffff" font-size="12" fill-opacity="0.45">Done</text><text x="1170" y="141" fill="#ffffff" font-size="12" fill-opacity="0.45">Open</text>

  <!-- weekly reviews strip -->
  <text x="104" y="196" fill="#ffffff" font-size="12" fill-opacity="0.35" letter-spacing="1">WEEKLY REVIEWS</text>
  <g>
    <rect x="104" y="206" width="200" height="62" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="124" y="232" fill="#ffffff" font-size="13" font-weight="500" fill-opacity="0.85">Jun 9 – Jun 15</text><text x="124" y="252" fill="#ffffff" font-size="12" fill-opacity="0.4">82% · 34 done</text>
    <rect x="316" y="206" width="200" height="62" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="336" y="232" fill="#ffffff" font-size="13" font-weight="500" fill-opacity="0.85">Jun 2 – Jun 8</text><text x="336" y="252" fill="#ffffff" font-size="12" fill-opacity="0.4">74% · 29 done</text>
    <rect x="528" y="206" width="200" height="62" rx="14" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="548" y="232" fill="#ffffff" font-size="13" font-weight="500" fill-opacity="0.85">May 26 – Jun 1</text><text x="548" y="252" fill="#ffffff" font-size="12" fill-opacity="0.4">69% · 27 done</text>
  </g>

  <!-- streak periods -->
  <text x="104" y="300" fill="#ffffff" font-size="12" fill-opacity="0.35" letter-spacing="1">STREAK PERIODS</text>
  <g font-size="12">
    <rect x="104" y="310" width="150" height="32" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.07"/>
    <path d="M120 320 c2 3 4 4 4 8 a4 4 0 1 1 -8 0 c0-1 1-2 1-3 c0 2 1 3 3 3 c-1-3 0-5 0-8z" fill="#ff8a4c"/>
    <text x="134" y="330" fill="#ffffff" fill-opacity="0.7">Jun 6 – Jun 18</text><text x="232" y="330" fill="#ffffff" fill-opacity="0.4">12d</text>
    <rect x="266" y="310" width="150" height="32" rx="16" fill="#ffffff" fill-opacity="0.045" stroke="#ffffff" stroke-opacity="0.07"/>
    <path d="M282 320 c2 3 4 4 4 8 a4 4 0 1 1 -8 0 c0-1 1-2 1-3 c0 2 1 3 3 3 c-1-3 0-5 0-8z" fill="#ff8a4c"/>
    <text x="296" y="330" fill="#ffffff" fill-opacity="0.7">May 19 – May 27</text><text x="398" y="330" fill="#ffffff" fill-opacity="0.4">9d</text>
  </g>

  <!-- month -->
  <text x="104" y="382" fill="#ffffff" font-size="13" font-weight="500" fill-opacity="0.55">June 2026</text>

  <!-- day cards grid (5 cols) -->
  <g id="cards"></g>
</svg>
