<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 840" width="1320" height="840" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="au1" cx="12%" cy="0%" r="60%"><stop offset="0" stop-color="#ff8a4c" stop-opacity="0.10"/><stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/></radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb27e"/><stop offset="1" stop-color="#ff8a4c"/></linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ff8a4c" stop-opacity="0.35"/><stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/></linearGradient>
  </defs>
  <rect width="1320" height="840" fill="#0a0a0c"/>
  <rect width="1320" height="840" fill="url(#au1)"/>

  <!-- rail -->
  <rect x="0" y="0" width="64" height="840" fill="#0e0e11" fill-opacity="0.7"/>
  <line x1="64" y1="0" x2="64" y2="840" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="14" y="20" width="36" height="36" rx="11" fill="#ff8a4c" fill-opacity="0.12"/>
  <path d="M 32 27 C 38 36 40 40 40 46 A 8 8 0 1 1 24 46 C 24 42 26 39 29 37 C 28 42 30 44 32 46 C 30 40 31 33 32 27 Z" fill="url(#flame)"/>
  <rect x="12" y="130" width="40" height="40" rx="11" fill="#ffffff" fill-opacity="0.07"/>
  <g stroke="#ff8a4c" stroke-width="2" fill="none"><path d="M24 158 v-12 M32 158 v-18 M40 158 v-8"/></g>

  <text x="104" y="62" fill="#ffffff" font-size="26" font-weight="700" letter-spacing="-0.5">Analytics</text>
  <text x="104" y="88" fill="#ffffff" font-size="14" fill-opacity="0.45">Your consistency, measured — never to shame, only to see.</text>

  <!-- stat cards -->
  <g>
    <g><rect x="104" y="116" width="270" height="110" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="128" y="150" fill="#ffffff" font-size="11" fill-opacity="0.45" letter-spacing="1">AVG COMPLETION</text>
      <text x="128" y="190" fill="#ffffff" font-size="30" font-weight="600">78%</text>
      <text x="128" y="210" fill="#ffffff" font-size="12" fill-opacity="0.4">last 30 days</text></g>
    <g><rect x="386" y="116" width="270" height="110" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="410" y="150" fill="#ffffff" font-size="11" fill-opacity="0.45" letter-spacing="1">CURRENT STREAK</text>
      <text x="410" y="190" fill="#ffffff" font-size="30" font-weight="600">12d</text>
      <text x="410" y="210" fill="#ffffff" font-size="12" fill-opacity="0.4">best 28 days</text></g>
    <g><rect x="668" y="116" width="270" height="110" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="692" y="150" fill="#ffffff" font-size="11" fill-opacity="0.45" letter-spacing="1">GOALS CLOSED</text>
      <text x="692" y="190" fill="#ffffff" font-size="30" font-weight="600">214</text>
      <text x="692" y="210" fill="#ffffff" font-size="12" fill-opacity="0.4">last 90 days</text></g>
    <g><rect x="950" y="116" width="266" height="110" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
      <text x="974" y="150" fill="#ffffff" font-size="11" fill-opacity="0.45" letter-spacing="1">BEST DAY</text>
      <text x="974" y="190" fill="#ffffff" font-size="30" font-weight="600">Thursday</text>
      <text x="974" y="210" fill="#ffffff" font-size="12" fill-opacity="0.4">by completion rate</text></g>
  </g>

  <!-- this week bars -->
  <rect x="104" y="242" width="546" height="250" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="128" y="276" fill="#ffffff" font-size="15" font-weight="500" fill-opacity="0.9">This week</text>
  <text x="626" y="276" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.35">completion %</text>
  <g transform="translate(150 300)" fill="#ff8a4c">
    <rect x="0" y="60" width="46" height="100" rx="6" fill-opacity="0.9"/>
    <rect x="70" y="30" width="46" height="130" rx="6" fill-opacity="0.9"/>
    <rect x="140" y="80" width="46" height="80" rx="6" fill-opacity="0.9"/>
    <rect x="210" y="10" width="46" height="150" rx="6" fill-opacity="0.9"/>
    <rect x="280" y="40" width="46" height="120" rx="6" fill-opacity="0.9"/>
    <rect x="350" y="96" width="46" height="64" rx="6" fill-opacity="0.5"/>
    <rect x="420" y="120" width="46" height="40" rx="6" fill-opacity="0.5"/>
  </g>
  <g transform="translate(150 476)" fill="#ffffff" fill-opacity="0.4" font-size="12" text-anchor="middle">
    <text x="23">Mon</text><text x="93">Tue</text><text x="163">Wed</text><text x="233">Thu</text><text x="303">Fri</text><text x="373">Sat</text><text x="443">Sun</text>
  </g>

  <!-- momentum area -->
  <rect x="670" y="242" width="546" height="250" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="694" y="276" fill="#ffffff" font-size="15" font-weight="500" fill-opacity="0.9">Momentum</text>
  <text x="1192" y="276" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.35">last 30 days</text>
  <path d="M694 440 L740 420 L786 430 L832 400 L878 410 L924 380 L970 392 L1016 360 L1062 372 L1108 340 L1154 352 L1192 330 L1192 470 L694 470 Z" fill="url(#area)"/>
  <path d="M694 440 L740 420 L786 430 L832 400 L878 410 L924 380 L970 392 L1016 360 L1062 372 L1108 340 L1154 352 L1192 330" fill="none" stroke="#ff8a4c" stroke-width="2.5"/>

  <!-- category breakdown -->
  <rect x="104" y="508" width="546" height="236" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="128" y="542" fill="#ffffff" font-size="15" font-weight="500" fill-opacity="0.9">By category</text>
  <text x="626" y="542" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.35">last 90 days</text>
  <g font-size="13">
    <rect x="128" y="566" width="26" height="26" rx="7" fill="#849ce8" fill-opacity="0.16"/><text x="166" y="576" fill="#ffffff" fill-opacity="0.7">School</text>
    <rect x="166" y="586" width="420" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/><rect x="166" y="586" width="420" height="8" rx="4" fill="#849ce8"/><text x="600" y="585" fill="#ffffff" fill-opacity="0.45" text-anchor="end">62</text>
    <rect x="128" y="606" width="26" height="26" rx="7" fill="#d0a478" fill-opacity="0.16"/><text x="166" y="616" fill="#ffffff" fill-opacity="0.7">Work</text>
    <rect x="166" y="626" width="340" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/><rect x="166" y="626" width="340" height="8" rx="4" fill="#d0a478"/><text x="600" y="625" fill="#ffffff" fill-opacity="0.45" text-anchor="end">48</text>
    <rect x="128" y="646" width="26" height="26" rx="7" fill="#7cb894" fill-opacity="0.16"/><text x="166" y="656" fill="#ffffff" fill-opacity="0.7">Health</text>
    <rect x="166" y="666" width="300" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/><rect x="166" y="666" width="300" height="8" rx="4" fill="#7cb894"/><text x="600" y="665" fill="#ffffff" fill-opacity="0.45" text-anchor="end">41</text>
    <rect x="128" y="686" width="26" height="26" rx="7" fill="#c296d4" fill-opacity="0.16"/><text x="166" y="696" fill="#ffffff" fill-opacity="0.7">Personal</text>
    <rect x="166" y="706" width="190" height="8" rx="4" fill="#ffffff" fill-opacity="0.05"/><rect x="166" y="706" width="190" height="8" rx="4" fill="#c296d4"/><text x="600" y="705" fill="#ffffff" fill-opacity="0.45" text-anchor="end">26</text>
  </g>

  <!-- heatmap -->
  <rect x="670" y="508" width="546" height="236" rx="16" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="694" y="542" fill="#ffffff" font-size="15" font-weight="500" fill-opacity="0.9">Consistency</text>
  <text x="1192" y="542" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.35">last 22 weeks</text>
  <g transform="translate(694 562)" id="hm"></g>
</svg>
