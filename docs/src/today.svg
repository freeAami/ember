<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1320 840" width="1320" height="840" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="au1" cx="12%" cy="0%" r="60%"><stop offset="0" stop-color="#ff8a4c" stop-opacity="0.12"/><stop offset="1" stop-color="#ff8a4c" stop-opacity="0"/></radialGradient>
    <radialGradient id="au2" cx="100%" cy="8%" r="55%"><stop offset="0" stop-color="#7d93ff" stop-opacity="0.10"/><stop offset="1" stop-color="#7d93ff" stop-opacity="0"/></radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb27e"/><stop offset="1" stop-color="#ff8a4c"/></linearGradient>
    <linearGradient id="day" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff8a4c"/><stop offset="1" stop-color="#9ab0ff"/></linearGradient>
  </defs>

  <rect width="1320" height="840" fill="#0a0a0c"/>
  <rect width="1320" height="840" fill="url(#au1)"/>
  <rect width="1320" height="840" fill="url(#au2)"/>

  <!-- left rail -->
  <rect x="0" y="0" width="64" height="840" fill="#0e0e11" fill-opacity="0.7"/>
  <line x1="64" y1="0" x2="64" y2="840" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="14" y="20" width="36" height="36" rx="11" fill="#ff8a4c" fill-opacity="0.12"/>
  <path d="M 32 27 C 38 36 40 40 40 46 A 8 8 0 1 1 24 46 C 24 42 26 39 29 37 C 28 42 30 44 32 46 C 30 40 31 33 32 27 Z" fill="url(#flame)"/>
  <!-- nav active (today) -->
  <rect x="12" y="78" width="40" height="40" rx="11" fill="#ffffff" fill-opacity="0.07"/>
  <rect x="23" y="90" width="18" height="16" rx="3" fill="none" stroke="#ff8a4c" stroke-width="2"/>
  <g stroke="#ffffff" stroke-opacity="0.4" stroke-width="2" fill="none">
    <rect x="23" y="138" width="18" height="14" rx="2"/>
    <path d="M25 168 h14 M25 174 h14 M25 180 h9"/>
    <circle cx="32" cy="214" r="8"/>
  </g>

  <!-- header -->
  <text x="104" y="58" fill="#ff8a4c" font-size="13" font-weight="600" letter-spacing="2" fill-opacity="0.85">THURSDAY, JUNE 18</text>
  <text x="103" y="96" fill="#ffffff" font-size="34" font-weight="700" letter-spacing="-1">Good morning<tspan fill="#ffffff" fill-opacity="0.45">, Ammar</tspan></text>

  <!-- goals card -->
  <g>
    <rect x="104" y="132" width="700" height="612" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="128" y="172" fill="#ffffff" font-size="15" font-weight="600" fill-opacity="0.9">Goals</text>
    <text x="178" y="172" fill="#ffffff" font-size="13" fill-opacity="0.35">3/6</text>
    <text x="780" y="172" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.35">Clear done</text>

    <!-- quick add -->
    <rect x="128" y="188" width="652" height="46" rx="12" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.07"/>
    <path d="M150 211 h14 M157 204 v14" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
    <text x="178" y="216" fill="#ffffff" font-size="15" fill-opacity="0.3">Add a goal…</text>

    <!-- goal rows -->
    <g font-size="15">
      <!-- done -->
      <rect x="128" y="250" width="652" height="44" rx="10" fill="#ffffff" fill-opacity="0.02"/>
      <rect x="142" y="261" width="22" height="22" rx="6" fill="#ff8a4c"/>
      <path d="M148 272 l4 4 l8 -9" stroke="#0a0a0c" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="278" fill="#ffffff" fill-opacity="0.4" text-decoration="line-through">Ship the PR</text>
      <rect x="690" y="263" width="78" height="20" rx="10" fill="#d0a478" fill-opacity="0.10" stroke="#d0a478" stroke-opacity="0.25"/>
      <circle cx="704" cy="273" r="3" fill="#d0a478"/><text x="713" y="277" font-size="11" fill="#d0a478">Work</text>

      <rect x="142" y="313" width="22" height="22" rx="6" fill="#ff8a4c"/>
      <path d="M148 324 l4 4 l8 -9" stroke="#0a0a0c" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="330" fill="#ffffff" fill-opacity="0.4" text-decoration="line-through">Morning run</text>
      <rect x="676" y="315" width="92" height="20" rx="10" fill="#7cb894" fill-opacity="0.10" stroke="#7cb894" stroke-opacity="0.25"/>
      <circle cx="690" cy="325" r="3" fill="#7cb894"/><text x="699" y="329" font-size="11" fill="#7cb894">Health</text>

      <rect x="142" y="365" width="22" height="22" rx="6" fill="#ff8a4c"/>
      <path d="M148 376 l4 4 l8 -9" stroke="#0a0a0c" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="176" y="382" fill="#ffffff" fill-opacity="0.4" text-decoration="line-through">Read 20 pages</text>
      <rect x="680" y="367" width="88" height="20" rx="10" fill="#849ce8" fill-opacity="0.10" stroke="#849ce8" stroke-opacity="0.25"/>
      <circle cx="694" cy="377" r="3" fill="#849ce8"/><text x="703" y="381" font-size="11" fill="#849ce8">School</text>

      <!-- open -->
      <rect x="142" y="417" width="22" height="22" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
      <text x="176" y="434" fill="#ffffff" fill-opacity="0.9">Design review with the team</text>
      <rect x="690" y="419" width="78" height="20" rx="10" fill="#d0a478" fill-opacity="0.10" stroke="#d0a478" stroke-opacity="0.25"/>
      <circle cx="704" cy="429" r="3" fill="#d0a478"/><text x="713" y="433" font-size="11" fill="#d0a478">Work</text>

      <rect x="142" y="469" width="22" height="22" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
      <text x="176" y="486" fill="#ffffff" fill-opacity="0.9">Flashcards before dinner</text>
      <rect x="680" y="471" width="88" height="20" rx="10" fill="#849ce8" fill-opacity="0.10" stroke="#849ce8" stroke-opacity="0.25"/>
      <circle cx="694" cy="481" r="3" fill="#849ce8"/><text x="703" y="485" font-size="11" fill="#849ce8">School</text>

      <rect x="142" y="521" width="22" height="22" rx="6" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1.5"/>
      <text x="176" y="538" fill="#ffffff" fill-opacity="0.9">Call family</text>
      <rect x="672" y="523" width="96" height="20" rx="10" fill="#c296d4" fill-opacity="0.10" stroke="#c296d4" stroke-opacity="0.25"/>
      <circle cx="686" cy="533" r="3" fill="#c296d4"/><text x="695" y="537" font-size="11" fill="#c296d4">Personal</text>
    </g>
  </g>

  <!-- pulse column -->
  <!-- ring card -->
  <rect x="824" y="132" width="392" height="330" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <g transform="translate(1020 248)">
    <!-- completion (primary, bold) -->
    <circle r="92" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="14"/>
    <circle r="92" fill="none" stroke="#ff8a4c" stroke-width="14" stroke-linecap="round" stroke-dasharray="578" stroke-dashoffset="289" transform="rotate(-90)"/>
    <!-- day elapsed (subtle, thin) -->
    <circle r="70" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="5"/>
    <circle r="70" fill="none" stroke="url(#day)" stroke-width="5" stroke-linecap="round" stroke-dasharray="440" stroke-dashoffset="167" stroke-opacity="0.5" transform="rotate(-90)"/>
    <text text-anchor="middle" y="-2" fill="#ffffff" font-size="44" font-weight="600" letter-spacing="-1">50<tspan font-size="22" fill="#ffffff" fill-opacity="0.5">%</tspan></text>
    <text text-anchor="middle" y="22" fill="#ffffff" font-size="13" fill-opacity="0.45">3 of 6 done</text>
    <circle cx="-30" cy="40" r="3" fill="url(#day)"/>
    <text text-anchor="middle" x="8" y="44" fill="#ffffff" font-size="10" fill-opacity="0.3" letter-spacing="1">62% OF DAY</text>
  </g>
  <line x1="848" y1="392" x2="1192" y2="392" stroke="#ffffff" stroke-opacity="0.06"/>
  <!-- streak -->
  <path d="M872 420 c3 5 7 7 7 13 a7 7 0 1 1 -14 0 c0 -2 1 -4 2 -5 c0 4 2 5 5 6 c-2 -5 -1 -10 0 -14 z" fill="#ff8a4c"/>
  <text x="892" y="420" fill="#ffffff" font-size="20" font-weight="600">12</text>
  <text x="892" y="436" fill="#ffffff" font-size="10" fill-opacity="0.4" letter-spacing="1">DAY STREAK</text>
  <line x1="960" y1="408" x2="960" y2="436" stroke="#ffffff" stroke-opacity="0.1"/>
  <text x="980" y="420" fill="#ffffff" font-size="20" font-weight="600" fill-opacity="0.8">28</text>
  <text x="980" y="436" fill="#ffffff" font-size="10" fill-opacity="0.4" letter-spacing="1">BEST</text>

  <!-- ticker card -->
  <rect x="824" y="476" width="392" height="74" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="844" y="502" fill="#ffffff" font-size="11" fill-opacity="0.4" letter-spacing="1">OPEN GOALS</text>
  <text x="844" y="528" font-size="12" font-family="monospace" fill="#ff8a4c">DR</text>
  <text x="872" y="528" font-size="13" fill="#ffffff" fill-opacity="0.75">Design review</text>
  <text x="990" y="528" font-size="12" font-family="monospace" fill="#ff8a4c">FB</text>
  <text x="1014" y="528" font-size="13" fill="#ffffff" fill-opacity="0.75">Flashcards</text>

  <!-- weekly review card -->
  <rect x="824" y="564" width="392" height="180" rx="18" fill="#ffffff" fill-opacity="0.035" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="844" y="592" fill="#ffffff" font-size="11" fill-opacity="0.4" letter-spacing="1">LAST WEEK</text>
  <text x="1196" y="592" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.35">Jun 9 – Jun 15</text>
  <text x="844" y="636" fill="#ffffff" font-size="36" font-weight="600" letter-spacing="-1">82<tspan font-size="18" fill="#ffffff" fill-opacity="0.45">%</tspan></text>
  <text x="1196" y="624" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.45">34 goals finished</text>
  <text x="1196" y="642" text-anchor="end" fill="#ffffff" font-size="12" fill-opacity="0.45">Thursday was strongest</text>
  <!-- mini bars -->
  <g transform="translate(844 656)">
    <g fill="#ff8a4c">
      <rect x="0" y="14" width="42" height="34" rx="4" fill-opacity="0.9"/>
      <rect x="50" y="6" width="42" height="42" rx="4" fill-opacity="0.9"/>
      <rect x="100" y="20" width="42" height="28" rx="4" fill-opacity="0.9"/>
      <rect x="150" y="0" width="42" height="48" rx="4" fill-opacity="0.9"/>
      <rect x="200" y="10" width="42" height="38" rx="4" fill-opacity="0.9"/>
      <rect x="250" y="24" width="42" height="24" rx="4" fill-opacity="0.5"/>
      <rect x="300" y="30" width="42" height="18" rx="4" fill-opacity="0.5"/>
    </g>
  </g>
</svg>
