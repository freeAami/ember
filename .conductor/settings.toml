#:schema https://conductor.build/schemas/settings.repo.schema.json
[scripts]
setup = """
npm install
"""

archive = """
echo "No background services to tear down for ember (static Vite app, no Docker)."
"""

run_mode = "concurrent"

[scripts.run.dev]
command = "npm run dev -- --port ${CONDUCTOR_PORT:-5173} --strictPort false --host 0.0.0.0"
default = true
icon = "play"

[scripts.run.build]
command = "npm run build"
icon = "hammer"

[scripts.run.typecheck]
command = "npm run typecheck"
icon = "check-circle"
